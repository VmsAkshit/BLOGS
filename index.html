<!DOCTYPE html>
<html lang="en">
<head>
    <meta property="og:site_name" content="StudoAI">
        <script type="application/ld+json">
        {
          "@context" : "https://schema.org",
          "@type" : "WebSite",
          "name" : "StudoAI Blogs",
          "url" : "https://www.blogs.studoai.me/"
        }
        </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StudoAI Blogs: Gamified study strategies, notes, and bounties written by top students.">
    <title>StudoAI Blogs | The Advanced Learner's Engine</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        /* 🚀 STUDOAI: ADVANCED BLOG UI */
        :root {
            --primary: #9333ea; 
            --primary-hover: #a855f7;
            --bg-base: #0f172a; 
            --bg-surface: #1e293b; 
            --bg-surface-elevated: #334155;
            --border-light: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glow: 0 0 20px rgba(147, 51, 234, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-base); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }

        /* --- Advanced Sticky Nav --- */
        .navbar {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-light); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
        }
        #progress-bar { position: absolute; bottom: -1px; left: 0; height: 2px; background: var(--primary-hover); width: 0%; transition: width 0.1s ease-out; box-shadow: var(--glow); }

        .logo { font-size: 1.5rem; font-weight: 800; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo span { background: rgba(147, 51, 234, 0.15); color: var(--primary-hover); font-size: 0.8rem; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }

        .nav-buttons { display: flex; gap: 15px; }
        .btn-write { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; text-decoration: none; transition: 0.2s; }
        .btn-write:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: var(--glow); }

        /* --- Featured Hero Article --- */
        .hero-container { padding: 3rem 5%; max-width: 1400px; margin: 0 auto; }
        
        .featured-article {
            display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;
            background: linear-gradient(145deg, var(--bg-surface), #151f32);
            border: 1px solid var(--border-light); border-radius: 24px; padding: 3rem;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer;
        }
        .featured-article:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        
        .featured-badge { display: inline-block; background: var(--primary); color: white; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 800; margin-bottom: 1rem; text-transform: uppercase; }
        .featured-title { font-size: 3rem; font-weight: 800; line-height: 1.1; margin-bottom: 1rem; }
        .featured-excerpt { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2rem; }
        /* --- Welcome Hero Banner --- */
        .hero-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, var(--bg-surface) 0%, rgba(147, 51, 234, 0.1) 100%);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 3rem 4rem;
            margin: 3rem auto 1rem auto;
            max-width: 1400px;
            width: 90%;
            position: relative;
            overflow: hidden;
        }

        .hero-banner::before {
            content: ''; position: absolute; top: -50%; right: -10%; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.2) 0%, transparent 70%); border-radius: 50%;
        }

        .banner-content { z-index: 1; max-width: 600px; }
        .banner-tag { color: var(--primary-hover); font-size: 0.9rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: inline-block; }
        .banner-title { font-size: 2.8rem; font-weight: 800; color: #fff; line-height: 1.1; margin-bottom: 1rem; }
        .banner-text { color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; }

        .banner-graphic { z-index: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .banner-graphic i { font-size: 6rem; color: var(--primary); filter: drop-shadow(0 0 30px rgba(147, 51, 234, 0.6)); animation: float 6s ease-in-out infinite; }

        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }

        @media (max-width: 900px) {
            .hero-banner { flex-direction: column; text-align: center; padding: 2.5rem 1.5rem; }
            .banner-graphic { display: none; }
            .banner-title { font-size: 2.2rem; }
        }
        /* --- Dynamic Filtering System --- */
        .filter-nav { display: flex; gap: 15px; overflow-x: auto; padding: 1rem 5%; max-width: 1400px; margin: 0 auto; scrollbar-width: none; }
        .filter-nav::-webkit-scrollbar { display: none; }
        .filter-btn { background: var(--bg-surface); border: 1px solid var(--border-light); color: var(--text-muted); padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; white-space: nowrap; }
        .filter-btn.active, .filter-btn:hover { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.05); }

        /* --- Article Grid (Dynamic Area) --- */
        .article-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem; padding: 2rem 5% 5rem 5%; max-width: 1400px; margin: 0 auto; }

        .article-card {
            background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: 16px; padding: 1.5rem;
            display: flex; flex-direction: column; gap: 15px; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; position: relative;
        }
        .article-card:hover { transform: translateY(-8px) scale(1.02); border-color: rgba(147, 51, 234, 0.5); box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3); }

        .card-meta { display: flex; justify-content: space-between; color: var(--primary-hover); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
        .card-title { font-size: 1.4rem; font-weight: 800; color: #fff; }
        .card-excerpt { color: var(--text-muted); font-size: 0.95rem; flex-grow: 1; }

        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-light); padding-top: 15px; margin-top: auto; }
        .author-info { display: flex; align-items: center; gap: 10px; }
        .author-info i { font-size: 1.8rem; color: var(--text-muted); }
        .author-text strong { display: block; font-size: 0.9rem; color: #fff; }
        
        .upvote-badge { background: rgba(255,255,255,0.05); border: 1px solid var(--border-light); color: var(--text-main); padding: 6px 12px; border-radius: 8px; display: flex; align-items: center; gap: 5px; font-weight: 600; }
        .article-card:hover .upvote-badge { background: rgba(147, 51, 234, 0.2); color: var(--primary-hover); border-color: var(--primary); }

        .loading-text { text-align: center; width: 100%; color: var(--primary-hover); font-weight: bold; font-size: 1.2rem; grid-column: 1 / -1; padding: 3rem 0; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        @media (max-width: 900px) { .featured-article { grid-template-columns: 1fr; } .featured-title { font-size: 2.2rem; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo"><i class="fa-solid fa-bolt"></i> StudoAI <span>Blogs</span></a>
        <div class="nav-buttons">
            <a href="submit.html" class="btn-write"><i class="fa-solid fa-pen-nib"></i> Write Article</a>
        </div>
        <div id="progress-bar"></div>
    </nav>


    <header class="hero-banner">
        <div class="banner-content">
            <span class="banner-tag"><i class="fa-solid fa-sparkles"></i> Welcome to the Hub</span>
            <h1 class="banner-title">Level up your knowledge.</h1>
            <p class="banner-text">Read high-level strategies from top students, or publish your own notes to earn massive XP drops in the StudoAI Arena.</p>
        </div>
        <div class="banner-graphic">
            <i class="fa-solid fa-rocket"></i>
        </div>
    </header>
    <div class="filter-nav">
        <button class="filter-btn active">Live Feed</button>
        <button class="filter-btn">🧬 Science</button>
        <button class="filter-btn">📐 Math</button>
        <button class="filter-btn">🧠 Study Hacks</button>
    </div>

    <main class="article-grid" id="blogFeed">
        <div class="loading-text"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading Live Arena...</div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 👉 IMPORTANT: REPLACE WITH YOUR V1 FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCJivdJTeZ2VnDw50Q2ZL3u4AiUj89Nols",
            authDomain: "smartquiz-f3264.firebaseapp.com",
            projectId: "smartquiz-f3264",
            storageBucket: "smartquiz-f3264.firebasestorage.app",
            messagingSenderId: "657819908694",
            appId: "1:657819908694:web:ca5bc42a9cf7b142e499f7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadArticles() {
            const feed = document.getElementById('blogFeed');

            try {
                // Fetch articles, newest first
                const q = query(collection(db, "articles"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                feed.innerHTML = ''; // Clear the loading animation

                if (querySnapshot.empty) {
                    feed.innerHTML = '<p style="text-align:center; color:var(--text-muted); grid-column: 1/-1;">No articles yet. Be the first to write one!</p>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const articleId = doc.id;

                    // Ensure status is published before showing it
                    if(data.status === "published") {
                        const cardHTML = `
                                <article class="article-card" onclick="window.open('article.html?id=${articleId}', '_blank')">
                                <div class="card-meta">
                                    <span><i class="fa-solid fa-folder-open"></i> ${data.category}</span>
                                </div>
                                <h2 class="card-title">${data.title}</h2>
                                <p class="card-excerpt">Click to read full strategy document...</p>
                                
                                <div class="card-footer">
                                    <div class="author-info">
                                        <i class="fa-solid fa-circle-user"></i>
                                        <div class="author-text">
                                            <strong>${data.author}</strong>
                                        </div>
                                    </div>
                                    <div class="upvote-badge"><i class="fa-solid fa-arrow-up"></i> ${data.upvotes || 0}</div>
                                </div>
                            </article>
                        `;
                        feed.innerHTML += cardHTML;
                    }
                });

            } catch (error) {
                console.error("Error loading articles:", error);
                feed.innerHTML = '<p style="color: #ef4444; grid-column: 1/-1; text-align: center;">Error loading feed. Please check your database rules.</p>';
            }
        }

        // Initialize Feed
        loadArticles();

        // Reading Progress Bar UI
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        });
    </script>
</body>
</html>
