<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading... | StudoAI Blogs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        /* 🚀 STUDOAI: ADVANCED ARTICLE UI */
        :root {
            --primary: #9333ea; 
            --primary-hover: #a855f7;
            --bg-base: #0f172a; 
            --bg-surface: #1e293b; 
            --border-light: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-reading: #cbd5e1;
            --glow: 0 0 20px rgba(147, 51, 234, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-base); color: var(--text-main); overflow-x: hidden; }

        /* --- Navbar --- */
        .navbar {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-light);
            padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
        }
        #progress-bar { position: absolute; bottom: -1px; left: 0; height: 2px; background: var(--primary-hover); width: 0%; transition: width 0.1s ease-out; box-shadow: 0 0 15px var(--primary); }
        .logo { font-size: 1.5rem; font-weight: 800; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo span { background: rgba(147, 51, 234, 0.15); color: var(--primary-hover); font-size: 0.8rem; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }
        .back-btn { color: var(--text-muted); text-decoration: none; font-weight: 600; transition: color 0.2s; display: flex; align-items: center; gap: 8px; }
        .back-btn:hover { color: #fff; }

        /* --- Article Layout --- */
        .article-layout {
            display: flex; justify-content: center; max-width: 1200px;
            margin: 0 auto; padding: 4rem 5%; gap: 4rem; position: relative;
        }

        /* --- Floating Action Bar --- */
        .action-sidebar {
            position: sticky; top: 100px; height: fit-content;
            display: flex; flex-direction: column; gap: 15px; padding-top: 2rem;
        }
        .action-btn {
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--bg-surface); border: 1px solid var(--border-light);
            color: var(--text-muted); font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .action-btn:hover { transform: translateY(-3px) scale(1.1); color: var(--primary-hover); border-color: var(--primary); box-shadow: var(--glow); }
        .action-count { text-align: center; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-top: -10px; }

        /* --- Main Reading Area --- */
        .article-content { max-width: 750px; width: 100%; }

        .article-tag { color: var(--primary-hover); font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: inline-block; }
        .article-title { font-size: 3rem; font-weight: 800; line-height: 1.2; margin-bottom: 1.5rem; color: #fff; }
        
        .article-meta { display: flex; align-items: center; gap: 15px; padding-bottom: 2rem; border-bottom: 1px solid var(--border-light); margin-bottom: 3rem; }
        .author-avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white; }
        .author-details strong { display: block; color: #fff; font-size: 1rem; }
        .author-details span { color: var(--text-muted); font-size: 0.85rem; }

        /* Document Embed Card */
        .doc-gateway {
            background: linear-gradient(145deg, var(--bg-surface), #151f32);
            border: 1px solid var(--primary);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            margin-top: 2rem;
            box-shadow: var(--glow);
        }
        .doc-gateway i { font-size: 4rem; color: var(--primary); margin-bottom: 20px; opacity: 0.8; }
        .doc-gateway h3 { color: #fff; font-size: 1.5rem; margin-bottom: 10px; }
        .doc-gateway p { color: var(--text-muted); margin-bottom: 25px; max-width: 400px; margin-left: auto; margin-right: auto; }
        
        .btn-read-doc {
            background: var(--primary); color: white; text-decoration: none;
            padding: 15px 30px; border-radius: 12px; font-size: 1.1rem; font-weight: 800;
            display: inline-flex; align-items: center; gap: 10px; transition: all 0.3s ease;
        }
        .btn-read-doc:hover { background: var(--primary-hover); transform: translateY(-3px); box-shadow: var(--glow); }

        .loading-state { text-align: center; padding: 5rem 0; color: var(--primary); font-size: 1.5rem; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        @media (max-width: 900px) {
            .article-layout { flex-direction: column; padding: 2rem 5%; gap: 2rem; }
            .action-sidebar { position: fixed; bottom: 0; left: 0; top: auto; width: 100%; flex-direction: row; justify-content: space-around; background: var(--bg-surface); padding: 10px; border-top: 1px solid var(--border-light); z-index: 100; }
            .action-count { display: none; }
            .article-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Hub</a>
        <a href="index.html" class="logo"><i class="fa-solid fa-bolt"></i> StudoAI <span>Blogs</span></a>
        <div id="progress-bar"></div>
    </nav>

    <div class="article-layout">
        
        <aside class="action-sidebar" id="actionSidebar" style="display: none;">
            <button class="action-btn" id="upvoteBtn"><i class="fa-solid fa-arrow-up"></i></button>
            <div class="action-count" id="upvoteCount">0</div>
            
            <button class="action-btn" onclick="copyLink()"><i class="fa-solid fa-link"></i></button>
        </aside>

        <main class="article-content" id="articleContent">
            <div class="loading-state">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Decrypting Strategy...
            </div>
        </main>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 👉 IMPORTANT: REPLACE WITH YOUR V1 FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCJivdJTeZ2VnDw50Q2ZL3u4AiUj89Nols",
            authDomain: "smartquiz-f3264.firebaseapp.com",
            projectId: "smartquiz-f3264",
            storageBucket: "smartquiz-f3264.firebasestorage.app",
            messagingSenderId: "657819908694",
            appId: "1:657819908694:web:ca5bc42a9cf7b142e499f7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. Get the Article ID from the URL (e.g., ?id=xyz123)
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        // If no ID is found, kick them back to the homepage or 404
        if (!articleId) {
            window.location.href = "404.html";
        }

        const articleRef = doc(db, "articles", articleId);
        let upvoted = false;

        // 2. Fetch the Data and Build the Page
        async function loadArticle() {
            try {
                const docSnap = await getDoc(articleRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // Update Page Title
                    document.title = `${data.title} | StudoAI Blogs`;

                    // Generate the HTML with Firebase Data
                    const contentHTML = `
                        <header>
                            <span class="article-tag"><i class="fa-solid fa-folder-open"></i> ${data.category}</span>
                            <h1 class="article-title">${data.title}</h1>
                            
                            <div class="article-meta">
                                <div class="author-avatar"><i class="fa-solid fa-user-ninja"></i></div>
                                <div class="author-details">
                                    <strong>${data.author}</strong>
                                    <span>StudoAI Creator</span>
                                </div>
                            </div>
                        </header>

                        <div class="doc-gateway">
                            <i class="fa-brands fa-google-drive"></i>
                            <h3>Strategy Document Secured</h3>
                            <p>This creator has written their full study guide, notes, and strategy inside a verified Google Document.</p>
                            
                            <a href="${data.docLink}" target="_blank" class="btn-read-doc">
                                Open Document <i class="fa-solid fa-arrow-up-right-from-square"></i>
                            </a>
                        </div>
                    `;
                    
                    // Inject into the page
                    document.getElementById('articleContent').innerHTML = contentHTML;
                    
                    // Setup Upvotes
                    document.getElementById('upvoteCount').innerText = data.upvotes || 0;
                    document.getElementById('actionSidebar').style.display = 'flex'; // Show sidebar now that data is loaded

                } else {
                    window.location.href = "404.html";
                }
            } catch (error) {
                console.error("Error fetching document:", error);
                document.getElementById('articleContent').innerHTML = "<h2 style='color:red;'>Error loading strategy.</h2>";
            }
        }

        // 3. Handle Live Upvotes
        document.getElementById('upvoteBtn').addEventListener('click', async () => {
            if (!upvoted) {
                upvoted = true;
                
                const countUI = document.getElementById('upvoteCount');
                const btnUI = document.getElementById('upvoteBtn');

                // Instant UI Update
                countUI.innerText = parseInt(countUI.innerText) + 1;
                btnUI.style.color = 'var(--primary)';
                btnUI.style.borderColor = 'var(--primary)';
                btnUI.style.background = 'rgba(147, 51, 234, 0.1)';

                // Send to Firebase
                try {
                    await updateDoc(articleRef, {
                        upvotes: increment(1)
                    });
                } catch (error) {
                    console.error("Error saving upvote:", error);
                }
            }
        });

        // Initialize
        loadArticle();

        // Reading Progress Bar UI
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        });

        // Copy Link
        window.copyLink = function() {
            navigator.clipboard.writeText(window.location.href);
            alert("Article link copied to clipboard!");
        }
    </script>
</body>
</html>
