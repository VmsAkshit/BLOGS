<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | StudoAI Blogs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        /* 🚀 STUDOAI: 404 GLITCH UI */
        :root {
            --primary: #9333ea; 
            --primary-hover: #a855f7;
            --bg-base: #0f172a; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Abstract Background Elements */
        .glow-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.2) 0%, rgba(15, 23, 42, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .error-container {
            position: relative;
            z-index: 1;
            max-width: 600px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            color: transparent;
            -webkit-text-stroke: 2px var(--primary);
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(147, 51, 234, 0.4);
            letter-spacing: 5px;
        }

        .error-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: #fff;
        }

        .error-message {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-home {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-home:hover {
            background: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(147, 51, 234, 0.4);
        }
    </style>
</head>
<body>

    <div class="glow-orb"></div>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">You've drifted out of bounds.</h1>
        <p class="error-message">This zone doesn't exist in the StudoAI Arena. The article may have been moved, deleted, or you might have a typo in the URL.</p>
        
        <a href="index.html" class="btn-home">
            <i class="fa-solid fa-house"></i> Return to Base
        </a>
    </div>

</body>
</html>
